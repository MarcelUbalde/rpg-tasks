version: "3.9"

# Runs Postgres only. Start the app with: npm run dev (local node process on port 3000).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rpg_tasks
      POSTGRES_USER: rpg
      POSTGRES_PASSWORD: rpg_dev_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg -d rpg_tasks"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
