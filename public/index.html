<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Tasks</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>RPG TASKS</h1>

  <canvas id="avatar-canvas" width="180" height="180"></canvas>
  <div id="avatar-user-select"><label for="active-user-select">Avatar:</label> <select id="active-user-select"></select></div>

  <div id="level-display">Nivel <span id="level-value" class="lv">1</span></div>
  <div id="exp-display">EXP: <span id="exp-value">0</span> / <span id="exp-next">1</span></div>
  <div id="stage-display">Etapa: <span id="stage-value">0</span></div>
  <div id="gold-display">Gold: <span id="gold-value">0</span></div>

  <button id="simulate-btn">Simular tarea completada (3 SP)</button>
  <button id="reset-btn">Reset personaje</button>
  <button id="add-gold-btn">Add 1 Gold (dev)</button>

  <div id="status"></div>

  <p class="log-header">HISTORIAL DE RECOMPENSAS</p>
  <ul id="log-list"></ul>

  <p class="log-header">USUARIOS</p>
  <ul id="users-list"></ul>
  <div id="award-panel">
    <div id="user-checkboxes"></div>
    <label>SP: <input type="number" id="sp-input" value="3" min="1" style="width:4em"></label>
    <label>Severity: <select id="severity-select">
      <option>Low</option><option>Medium</option><option selected>High</option><option>Critical</option>
    </select></label>
    <br>
    <label>TASK key: <input type="text" id="task-key-input" placeholder="auto (HU-DEMO-N)"></label>
    <button id="award-task-btn">Award TASK</button>
    <button id="repeat-task-btn">Repeat last TASK</button>
    <button id="create-task-event-btn">Create TASK event</button>
    <button id="apply-task-event-btn">Apply last TASK event</button>
    <br>
    <label>BUG key: <input type="text" id="bug-key-input" placeholder="auto (BUG-DEMO-N)"></label>
    <button id="award-bug-btn">Award BUG</button>
    <button id="repeat-bug-btn">Repeat last BUG</button>
    <button id="create-bug-event-btn">Create BUG event</button>
    <button id="apply-bug-event-btn">Apply last BUG event</button>
    <hr>
    <button id="reset-multi-btn">Reset u1+u2 (dev)</button>
  </div>

  <p class="log-header">HISTORIAL (<span id="history-user-label">—</span>)</p>
  <ul id="history-list"></ul>

  <script type="module">
    import { drawAvatar } from "./avatar.js";
    import { completeTask, getLog, devReset, addGold, getUsers, awardTask, awardBug, resetMulti, getUserRewards, createTaskEvent, createBugEvent, applyEvent } from "./api.js";

    let taskSeq = 0;
    let bugSeq = 0;
    let lastTaskKey = null;
    let lastBugKey = null;
    let lastTaskEventId = null;
    let lastBugEventId  = null;

    const canvas    = document.getElementById("avatar-canvas");
    const levelEl   = document.getElementById("level-value");
    const expEl     = document.getElementById("exp-value");
    const expNextEl = document.getElementById("exp-next");
    const stageEl   = document.getElementById("stage-value");
    const btn         = document.getElementById("simulate-btn");
    const resetBtn    = document.getElementById("reset-btn");
    const addGoldBtn  = document.getElementById("add-gold-btn");
    const goldEl      = document.getElementById("gold-value");
    const statusEl    = document.getElementById("status");
    const logList     = document.getElementById("log-list");
    const activeUserSelect = document.getElementById("active-user-select");
    const usersListEl      = document.getElementById("users-list");
    const resetMultiBtn    = document.getElementById("reset-multi-btn");
    const historyUserLabel = document.getElementById("history-user-label");
    const historyList      = document.getElementById("history-list");
    const userCheckboxesEl = document.getElementById("user-checkboxes");
    const spInput          = document.getElementById("sp-input");
    const severitySelect   = document.getElementById("severity-select");
    const taskKeyInput     = document.getElementById("task-key-input");
    const bugKeyInput      = document.getElementById("bug-key-input");
    const awardTaskBtn     = document.getElementById("award-task-btn");
    const repeatTaskBtn    = document.getElementById("repeat-task-btn");
    const awardBugBtn          = document.getElementById("award-bug-btn");
    const repeatBugBtn         = document.getElementById("repeat-bug-btn");
    const createTaskEventBtn   = document.getElementById("create-task-event-btn");
    const applyTaskEventBtn    = document.getElementById("apply-task-event-btn");
    const createBugEventBtn    = document.getElementById("create-bug-event-btn");
    const applyBugEventBtn     = document.getElementById("apply-bug-event-btn");

    // Fibonacci cost — mirrors server/domain/User.js#levelUpCost
    function levelUpCost(level) {
      if (level <= 1) return 1;
      if (level === 2) return 2;
      let a = 1, b = 2;
      for (let i = 3; i <= level; i++) [a, b] = [b, a + b];
      return b;
    }

    function setStatus(msg, type = "") {
      statusEl.textContent = msg;
      statusEl.className = type;
    }

    function showConflict(c) {
      const storedStr = JSON.stringify(c.stored);
      const requestedStr = JSON.stringify(c.requested);
      setStatus(
        `Conflicto: key "${c.key}" ya existe con payload distinto. Stored: ${storedStr} | Requested: ${requestedStr}`,
        "error"
      );
    }

    function renderLogEntry(entry) {
      const li = document.createElement("li");
      const time = new Date(entry.created_at).toLocaleTimeString();
      li.innerHTML =
        `<span class="entry-msg">${entry.message}</span>` +
        `<span class="entry-time">${time}</span>`;
      return li;
    }

    async function refreshUI() {
      const [users, logs] = await Promise.all([getUsers(), getLog(10)]);
      // Repopulate selector, preserving current selection (default: "local")
      const currentVal = activeUserSelect.value || "local";
      activeUserSelect.innerHTML = "";
      users.forEach((u) => {
        const opt = document.createElement("option");
        opt.value = u.id;
        opt.textContent = u.id;
        activeUserSelect.appendChild(opt);
      });
      activeUserSelect.value = users.some((u) => u.id === currentVal) ? currentVal : "local";
      // Find active user, fallback to local
      const user = users.find((u) => u.id === activeUserSelect.value)
                ?? users.find((u) => u.id === "local")
                ?? users[0];
      levelEl.textContent   = user.level;
      expEl.textContent     = user.exp;
      expNextEl.textContent = levelUpCost(user.level);
      stageEl.textContent   = user.evolutionStage;
      goldEl.textContent    = user.gold;
      drawAvatar(canvas, user.level);
      logList.innerHTML = "";
      logs.forEach(e => logList.appendChild(renderLogEntry(e)));
    }

    btn.addEventListener("click", async () => {
      const taskId = "TASK-" + Date.now();
      btn.disabled = true;
      setStatus("Procesando...");

      try {
        const result = await completeTask(taskId, 3);
        if (result.rewarded) {
          if (result.levelsGained > 0) {
            setStatus(
              `+${result.levelsGained} nivel(es)! Ahora nivel ${result.newLevel}.`,
              "success"
            );
          } else {
            setStatus(
              `EXP ganada. Nivel ${result.newLevel} (${result.newExp} EXP acumulada).`,
              "success"
            );
          }
          await refreshUI();
        } else {
          setStatus(`No recompensado: ${result.reason}`, "error");
        }
      } catch {
        setStatus("Error de servidor. Inténtalo de nuevo.", "error");
      } finally {
        btn.disabled = false;
      }
    });

    resetBtn.addEventListener("click", async () => {
      resetBtn.disabled = true;
      try {
        await devReset();
        setStatus("Personaje reseteado", "success");
        await refreshUI();
      } catch {
        setStatus("Error al resetear.", "error");
      } finally {
        resetBtn.disabled = false;
      }
    });

    addGoldBtn.addEventListener("click", async () => {
      addGoldBtn.disabled = true;
      try {
        await addGold(1);
        await refreshUI();
      } catch {
        setStatus("Error al añadir gold.", "error");
      } finally {
        addGoldBtn.disabled = false;
      }
    });

    async function refreshHistory() {
      const selectedId = activeUserSelect.value;
      if (!selectedId) return;
      const { userId, items } = await getUserRewards(selectedId, 20);
      historyUserLabel.textContent = userId;
      historyList.innerHTML = "";
      items.forEach((item) => {
        const li = document.createElement("li");
        const time = new Date(item.createdAt).toLocaleTimeString();
        const reward = item.expAwarded > 0 ? `+${item.expAwarded} EXP` : `+${item.goldAwarded} Gold`;
        const payloadStr = item.payload
          ? ` (${Object.entries(item.payload).map(([k, v]) => `${k}:${v}`).join(", ")})`
          : "";
        li.textContent = `${time} ${item.type} ${item.key}  ${reward}${payloadStr}`;
        historyList.appendChild(li);
      });
    }

    function formatTaskResult(r) {
      if (r.rewarded) {
        const gained = Number.isInteger(r.levelsGained) ? r.levelsGained : 0;
        const lvStr = gained > 0
          ? `Lv${r.newLevel - gained} → Lv${r.newLevel}, newExp: ${r.newExp}`
          : `Lv${r.newLevel}, newExp: ${r.newExp}`;
        return `rewarded (${lvStr})`;
      }
      return r.reason ?? "not rewarded";
    }

    function formatBugResult(r) {
      if (r.rewarded) return `rewarded (+${r.goldAwarded} Gold, newGold: ${r.newGold})`;
      return r.reason ?? "not rewarded";
    }

    function resultCssClass(results) {
      if (results.some((r) => r.reason === "user_not_found")) return "error";
      if (results.some((r) => r.rewarded)) return "success";
      return "";
    }

    function renderResultStatus(title, results, formatLine) {
      const strong = document.createElement("strong");
      strong.textContent = title;
      const ul = document.createElement("ul");
      results.forEach((r) => {
        const li = document.createElement("li");
        li.textContent = `${r.userId}: ${formatLine(r)}`;
        ul.appendChild(li);
      });
      statusEl.className = resultCssClass(results);
      statusEl.innerHTML = "";
      statusEl.appendChild(strong);
      statusEl.appendChild(ul);
    }

    function getSelectedUserIds() {
      return Array.from(userCheckboxesEl.querySelectorAll("input:checked")).map((cb) => cb.value);
    }

    function ensureNonEmptySelection(userIds) {
      if (userIds.length === 0) {
        setStatus("Selecciona al menos 1 usuario.", "error");
        return false;
      }
      return true;
    }

    function nextTaskKey() { return `HU-DEMO-${++taskSeq}`; }
    function nextBugKey()  { return `BUG-DEMO-${++bugSeq}`; }

    function populateUserCheckboxes(users) {
      const checked = new Set(
        Array.from(userCheckboxesEl.querySelectorAll("input:checked")).map((cb) => cb.value)
      );
      const nonLocal = users.filter((u) => u.id !== "local");
      userCheckboxesEl.innerHTML = "";
      users.forEach((u) => {
        const label = document.createElement("label");
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.value = u.id;
        cb.checked = checked.size > 0 ? checked.has(u.id) : (nonLocal.length > 0 ? u.id !== "local" : true);
        label.appendChild(cb);
        label.appendChild(document.createTextNode(" " + u.id));
        userCheckboxesEl.appendChild(label);
      });
    }

    function renderUserEntry(u) {
      const li = document.createElement("li");
      li.textContent = `${u.id}  Lv${u.level}  EXP:${u.exp}  Gold:${u.gold}`;
      return li;
    }

    async function refreshUsers() {
      const users = await getUsers();
      populateUserCheckboxes(users);
      usersListEl.innerHTML = "";
      users.forEach((u) => usersListEl.appendChild(renderUserEntry(u)));
    }

    activeUserSelect.addEventListener("change", () => {
      refreshUI().catch(() => {});
      refreshHistory().catch(() => {});
    });

    async function doAwardTask(key, storyPoints, userIds) {
      try {
        const result = await awardTask(key, storyPoints, userIds);
        lastTaskEventId = result.event.id;
        renderResultStatus(`${result.event.type} ${result.event.key}`, result.results, formatTaskResult);
        await Promise.all([refreshUsers(), refreshUI(), refreshHistory()]);
      } catch (err) {
        if (err.conflict) { showConflict(err.conflict); return; }
        setStatus("Error al simular TASK.", "error");
      }
    }

    async function doAwardBug(key, severity, userIds) {
      try {
        const result = await awardBug(key, severity, userIds);
        lastBugEventId = result.event.id;
        renderResultStatus(`${result.event.type} ${result.event.key}`, result.results, formatBugResult);
        await Promise.all([refreshUsers(), refreshUI(), refreshHistory()]);
      } catch (err) {
        if (err.conflict) { showConflict(err.conflict); return; }
        setStatus("Error al simular BUG.", "error");
      }
    }

    awardTaskBtn.addEventListener("click", async () => {
      const userIds = getSelectedUserIds();
      if (!ensureNonEmptySelection(userIds)) return;
      const storyPoints = Math.max(1, Number(spInput.value) || 3);
      let key = taskKeyInput.value.trim();
      if (!key) { key = nextTaskKey(); taskKeyInput.value = key; }
      lastTaskKey = key;
      awardTaskBtn.disabled = true;
      await doAwardTask(key, storyPoints, userIds);
      awardTaskBtn.disabled = false;
    });

    repeatTaskBtn.addEventListener("click", async () => {
      if (!lastTaskKey) { setStatus("Primero lanza un TASK.", "error"); return; }
      const userIds = getSelectedUserIds();
      if (!ensureNonEmptySelection(userIds)) return;
      const storyPoints = Math.max(1, Number(spInput.value) || 3);
      repeatTaskBtn.disabled = true;
      await doAwardTask(lastTaskKey, storyPoints, userIds);
      repeatTaskBtn.disabled = false;
    });

    awardBugBtn.addEventListener("click", async () => {
      const userIds = getSelectedUserIds();
      if (!ensureNonEmptySelection(userIds)) return;
      const severity = severitySelect.value;
      let key = bugKeyInput.value.trim();
      if (!key) { key = nextBugKey(); bugKeyInput.value = key; }
      lastBugKey = key;
      awardBugBtn.disabled = true;
      await doAwardBug(key, severity, userIds);
      awardBugBtn.disabled = false;
    });

    repeatBugBtn.addEventListener("click", async () => {
      if (!lastBugKey) { setStatus("Primero lanza un BUG.", "error"); return; }
      const userIds = getSelectedUserIds();
      if (!ensureNonEmptySelection(userIds)) return;
      const severity = severitySelect.value;
      repeatBugBtn.disabled = true;
      await doAwardBug(lastBugKey, severity, userIds);
      repeatBugBtn.disabled = false;
    });

    createTaskEventBtn.addEventListener("click", async () => {
      const storyPoints = Math.max(1, Number(spInput.value) || 3);
      let key = taskKeyInput.value.trim();
      if (!key) { key = nextTaskKey(); taskKeyInput.value = key; }
      lastTaskKey = key;
      createTaskEventBtn.disabled = true;
      try {
        const { event } = await createTaskEvent(key, storyPoints);
        lastTaskEventId = event.id;
        setStatus(`Created TASK event id=${event.id} key=${event.key}`, "success");
      } catch { setStatus("Error al crear TASK event.", "error"); }
      finally { createTaskEventBtn.disabled = false; }
    });

    applyTaskEventBtn.addEventListener("click", async () => {
      if (!lastTaskEventId) { setStatus("Primero crea un TASK event.", "error"); return; }
      const userIds = getSelectedUserIds();
      if (!ensureNonEmptySelection(userIds)) return;
      applyTaskEventBtn.disabled = true;
      try {
        const result = await applyEvent(lastTaskEventId, userIds);
        renderResultStatus(`${result.event.type} ${result.event.key}`, result.results, formatTaskResult);
        await Promise.all([refreshUsers(), refreshUI(), refreshHistory()]);
      } catch { setStatus("Error al aplicar TASK event.", "error"); }
      finally { applyTaskEventBtn.disabled = false; }
    });

    createBugEventBtn.addEventListener("click", async () => {
      const severity = severitySelect.value;
      let key = bugKeyInput.value.trim();
      if (!key) { key = nextBugKey(); bugKeyInput.value = key; }
      lastBugKey = key;
      createBugEventBtn.disabled = true;
      try {
        const { event } = await createBugEvent(key, severity);
        lastBugEventId = event.id;
        setStatus(`Created BUG event id=${event.id} key=${event.key}`, "success");
      } catch { setStatus("Error al crear BUG event.", "error"); }
      finally { createBugEventBtn.disabled = false; }
    });

    applyBugEventBtn.addEventListener("click", async () => {
      if (!lastBugEventId) { setStatus("Primero crea un BUG event.", "error"); return; }
      const userIds = getSelectedUserIds();
      if (!ensureNonEmptySelection(userIds)) return;
      applyBugEventBtn.disabled = true;
      try {
        const result = await applyEvent(lastBugEventId, userIds);
        renderResultStatus(`${result.event.type} ${result.event.key}`, result.results, formatBugResult);
        await Promise.all([refreshUsers(), refreshUI(), refreshHistory()]);
      } catch { setStatus("Error al aplicar BUG event.", "error"); }
      finally { applyBugEventBtn.disabled = false; }
    });

    resetMultiBtn.addEventListener("click", async () => {
      resetMultiBtn.disabled = true;
      try {
        await resetMulti();
        setStatus("u1 y u2 reseteados a L1", "success");
        await Promise.all([refreshUsers(), refreshUI(), refreshHistory()]);
      } catch {
        setStatus("Error al resetear u1+u2.", "error");
      } finally {
        resetMultiBtn.disabled = false;
      }
    });

    // Initial render
    refreshUI()
      .then(() => refreshHistory())
      .catch(() => setStatus("No se pudo cargar el estado del usuario.", "error"));
    refreshUsers().catch(() => {});
  </script>
</body>
</html>
